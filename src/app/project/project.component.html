<article
  class="group bg-surface border border-wire rounded-2xl overflow-hidden flex flex-col h-full transition-all duration-300 hover:border-wire-hi hover:-translate-y-[5px] hover:shadow-[0_20px_52px_rgba(0,0,0,0.38),0_0_0_1px_var(--border-accent)]"
>
  <!-- ── Image ─────────────────────────────────────────────────── -->
  <div class="relative overflow-hidden h-[190px] shrink-0">
    <img
      [src]="project().image"
      [alt]="project() | getlang: 'title'"
      width="400"
      height="190"
      loading="lazy"
      decoding="async"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.06]"
    />

    <!-- Subtle permanent gradient at bottom (for number badge readability) -->
    <div
      class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-transparent"
    ></div>

    <!-- Project number — bottom-right of image -->
    <span
      class="absolute bottom-3 end-3.5 text-[11px] font-mono font-bold text-white/45 tracking-wider select-none"
      aria-hidden="true"
    >
      {{ project().id.toString().padStart(2, '0') }}
    </span>
  </div>

  <!-- ── Card Body ──────────────────────────────────────────────── -->
  <div class="px-5 py-4 flex flex-col flex-1 gap-3">

    <!-- Title -->
    <h3
      class="text-[14.5px] font-semibold text-ink leading-snug group-hover:text-accent transition-colors duration-200"
    >
      {{ project() | getlang: "title" }}
    </h3>

    <!-- Description (always visible, 2 lines max) -->
    <p class="text-[12.5px] text-ink-2 leading-[1.75] line-clamp-2 flex-1">
      {{ project() | getlang: "description" }}
    </p>

    <!-- Tech tags -->
    <div class="flex flex-wrap gap-1.5">
      @for (tech of project().technologies; track tech) {
        <span class="tech-tag">{{ tech }}</span>
      }
    </div>

    <!-- Action buttons -->
    <div class="flex gap-2 pt-1">
      <a
        [href]="project().link"
        target="_blank"
        rel="noopener noreferrer"
        class="flex-1 flex items-center justify-center gap-1.5 py-[9px] rounded-[10px] text-[12.5px] font-semibold no-underline transition-all duration-200 bg-accent text-white hover:bg-accent-hover hover:-translate-y-px hover:shadow-[0_5px_16px_var(--accent-glow)]"
      >
        <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
        {{ "live" | translate }}
      </a>
      <a
        [href]="project().github"
        target="_blank"
        rel="noopener noreferrer"
        class="flex-1 flex items-center justify-center gap-1.5 py-[9px] rounded-[10px] text-[12.5px] font-semibold no-underline transition-all duration-200 bg-raised text-ink-2 border border-wire hover:bg-[#24292e] hover:text-white hover:border-[#24292e] hover:-translate-y-px"
      >
        <i class="fa-brands fa-github text-[12px]"></i>
        {{ "github" | translate }}
      </a>
    </div>
  </div>
</article>
