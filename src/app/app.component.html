<!-- Skip to main content (keyboard accessibility) -->
<a href="#main-content" class="skip-link">Skip to content</a>

@if (loading) {
  <div class="fixed inset-0 flex items-center justify-center bg-page z-[9999]">
    <div class="relative w-[72px] h-[72px] flex items-center justify-center">
      <div class="loader-ring"></div>
      <span class="text-[15px] font-bold text-accent tracking-[0.05em]">TM</span>
    </div>
  </div>
} @else {
  <div
    class="flex h-dvh overflow-hidden max-md:flex-col max-md:h-auto max-md:overflow-visible"
  >
    <div
      class="shrink-0 w-20 h-dvh overflow-hidden max-md:w-full max-md:h-auto max-md:overflow-visible"
    >
      <app-sidebar></app-sidebar>
    </div>
    <main
      id="main-content"
      class="content flex-1 h-dvh overflow-y-auto bg-page scroll-smooth max-md:h-auto max-md:min-h-[calc(100dvh-70px)] max-md:overflow-visible"
    >
      <router-outlet></router-outlet>
      <app-footer></app-footer>
    </main>
  </div>
}
