<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Taha Mahmoud — Frontend Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Taha Mahmoud — Frontend Engineer specializing in Angular, TypeScript, and modern web technologies. Available for freelance and full-time opportunities."
    />
    <meta name="author" content="Taha Mahmoud" />
    <meta
      property="og:title"
      content="Taha Mahmoud — Frontend Engineer"
    />
    <meta
      property="og:description"
      content="Building fast, accessible, and beautiful web experiences with Angular & TypeScript."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@tahamahmoudx417" />
    <link rel="icon" type="image/png" href="assets/images/logo-64.png" />
    <!-- Preload the hero (LCP) image -->
    <link rel="preload" as="image" href="assets/images/profile.webp" fetchpriority="high" />
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts (only used weights: 400, 500, 600, 700, 800). Angular inlines these
         into the HTML at build time, so they are not a render-blocking network
         request in production. Keeping them as a normal stylesheet means text
         paints with the final font (no swap), which avoids layout shift (CLS). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Inline splash loader: paints instantly with the static HTML and is
         removed by main.ts the moment Angular finishes bootstrapping. -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-color, #080c14);
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-loader.app-loader--hide {
        opacity: 0;
        visibility: hidden;
      }
      #app-loader .app-loader__ring {
        position: relative;
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-loader .app-loader__ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(108, 99, 255, 0.18);
        border-top-color: #6c63ff;
        animation: app-loader-spin 1s linear infinite;
      }
      #app-loader .app-loader__tm {
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.05em;
        color: #6c63ff;
      }
      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .app-loader__ring::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
    <div id="app-loader" aria-hidden="true">
      <div class="app-loader__ring"><span class="app-loader__tm">TM</span></div>
    </div>
  </body>
</html>
