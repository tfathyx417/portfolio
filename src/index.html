<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Taha Mahmoud — Frontend Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Taha Mahmoud — Frontend Engineer specializing in Angular, TypeScript, and modern web technologies. Available for freelance and full-time opportunities."
    />
    <meta name="author" content="Taha Mahmoud" />
    <meta
      property="og:title"
      content="Taha Mahmoud — Frontend Engineer"
    />
    <meta
      property="og:description"
      content="Building fast, accessible, and beautiful web experiences with Angular & TypeScript."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@tahamahmoudx417" />
    <link rel="icon" type="image/png" href="assets/images/logo-64.png" />
    <!-- Preload the hero (LCP) image -->
    <link rel="preload" as="image" href="assets/images/profile.webp" fetchpriority="high" />
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts (only used weights: 400, 500, 600, 700, 800). Angular inlines these
         into the HTML at build time, so they are not a render-blocking network
         request in production. Keeping them as a normal stylesheet means text
         paints with the final font (no swap), which avoids layout shift (CLS). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  </body>
